<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django API 集成测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 40px;
        }
        
        .status {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .data-section {
            margin-bottom: 40px;
        }
        
        h2 {
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .article-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .article-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2d3748;
        }
        
        .article-meta {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 10px;
        }
        
        .article-excerpt {
            color: #4a5568;
            line-height: 1.5;
        }
        
        .categories-tags {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .category-list, .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .category, .tag {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .category {
            background: #667eea;
            color: white;
        }
        
        .tag {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        @media (max-width: 768px) {
            .categories-tags {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Firefly + Django API 集成测试</h1>
            <p>验证前后端分离架构可行性</p>
        </header>
        
        <div class="content">
            <div id="status" class="status">
                正在连接Django API...
            </div>
            
            <div class="data-section">
                <h2>最新文章</h2>
                <div id="articles" class="articles-grid">
                    <!-- 文章将通过JavaScript动态加载 -->
                </div>
            </div>
            
            <div class="categories-tags">
                <div>
                    <h2>分类</h2>
                    <div id="categories" class="category-list">
                        <!-- 分类将通过JavaScript动态加载 -->
                    </div>
                </div>
                
                <div>
                    <h2>标签</h2>
                    <div id="tags" class="tag-list">
                        <!-- 标签将通过JavaScript动态加载 -->
                    </div>
                </div>
            </div>
            
            <div class="data-section">
                <h2>API信息</h2>
                <div style="background: #f8f9fa; padding: 20px; border-radius: 10px;">
                    <p><strong>Django API地址:</strong> http://localhost:8000/api/</p>
                    <p><strong>Firefly前端地址:</strong> http://localhost:4321/</p>
                    <p><strong>测试页面:</strong> http://localhost:4321/api-test.html</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Django API配置
        const API_BASE_URL = 'http://localhost:8000/api';
        
        // 更新状态
        function updateStatus(message, isError = false) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${isError ? 'error' : 'success'}`;
        }
        
        // 加载文章
        async function loadArticles() {
            try {
                const response = await fetch(`${API_BASE_URL}/articles/?page=1&page_size=5`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                const articlesEl = document.getElementById('articles');
                articlesEl.innerHTML = '';
                
                data.results.forEach(article => {
                    const excerpt = article.body
                        .replace(/#{1,6}\s*/g, '')
                        .replace(/\*\*/g, '')
                        .replace(/`/g, '')
                        .substring(0, 100) + '...';
                    
                    const articleCard = document.createElement('div');
                    articleCard.className = 'article-card';
                    articleCard.innerHTML = `
                        <div class="article-title">${article.title}</div>
                        <div class="article-meta">
                            <span>👁️ ${article.views} 浏览</span>
                            <span>👍 ${article.likes}</span>
                            <span>📅 ${new Date(article.pub_time).toLocaleDateString('zh-CN')}</span>
                        </div>
                        <div class="article-excerpt">${excerpt}</div>
                    `;
                    articlesEl.appendChild(articleCard);
                });
                
                return data.results.length;
            } catch (error) {
                console.error('加载文章失败:', error);
                document.getElementById('articles').innerHTML = 
                    `<p style="color: #ef4444; text-align: center;">加载文章失败: ${error.message}</p>`;
                return 0;
            }
        }
        
        // 加载分类
        async function loadCategories() {
            try {
                const response = await fetch(`${API_BASE_URL}/categories/`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const categories = await response.json();
                
                const categoriesEl = document.getElementById('categories');
                categoriesEl.innerHTML = '';
                
                categories.forEach(category => {
                    const categoryEl = document.createElement('div');
                    categoryEl.className = 'category';
                    categoryEl.textContent = category.name;
                    categoriesEl.appendChild(categoryEl);
                });
                
                return categories.length;
            } catch (error) {
                console.error('加载分类失败:', error);
                document.getElementById('categories').innerHTML = 
                    `<p style="color: #ef4444;">加载分类失败</p>`;
                return 0;
            }
        }
        
        // 加载标签
        async function loadTags() {
            try {
                const response = await fetch(`${API_BASE_URL}/tags/`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const tags = await response.json();
                
                const tagsEl = document.getElementById('tags');
                tagsEl.innerHTML = '';
                
                tags.forEach(tag => {
                    const tagEl = document.createElement('div');
                    tagEl.className = 'tag';
                    tagEl.textContent = `#${tag.name}`;
                    tagsEl.appendChild(tagEl);
                });
                
                return tags.length;
            } catch (error) {
                console.error('加载标签失败:', error);
                document.getElementById('tags').innerHTML = 
                    `<p style="color: #ef4444;">加载标签失败</p>`;
                return 0;
            }
        }
        
        // 初始化加载
        async function init() {
            try {
                // 测试API连接
                const testResponse = await fetch(`${API_BASE_URL}/articles/`);
                if (!testResponse.ok) {
                    throw new Error(`Django API连接失败: HTTP ${testResponse.status}`);
                }
                
                updateStatus('✅ Django API连接成功，正在加载数据...');
                
                // 并行加载所有数据
                const [articleCount, categoryCount, tagCount] = await Promise.all([
                    loadArticles(),
                    loadCategories(),
                    loadTags()
                ]);
                
                updateStatus(`✅ 数据加载完成！共加载 ${articleCount} 篇文章, ${categoryCount} 个分类, ${tagCount} 个标签`);
                
            } catch (error) {
                console.error('初始化失败:', error);
                updateStatus(`❌ 连接失败: ${error.message}`, true);
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
